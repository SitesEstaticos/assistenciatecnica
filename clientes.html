<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a8a">
    <title>Clientes - Assistência Técnica</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-small">AT</div>
                <h2>Assistência</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="clientes.html" class="nav-item active" data-page="clientes">
                    <span class="icon">👥</span>
                    <span>Clientes</span>
                </a>
                <a href="equipamentos.html" class="nav-item" data-page="equipamentos">
                    <span class="icon">💻</span>
                    <span>Equipamentos</span>
                </a>
                <a href="ordens-servico.html" class="nav-item" data-page="ordens">
                    <span class="icon">📋</span>
                    <span>Ordens de Serviço</span>
                </a>
                <a href="estoque.html" class="nav-item" data-page="estoque">
                    <span class="icon">📦</span>
                    <span>Estoque</span>
                </a>
                <a href="relatorios.html" class="nav-item" data-page="relatorios">
                    <span class="icon">📈</span>
                    <span>Relatórios</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-logout">
                    <span class="icon">🚪</span>
                    <span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1>Clientes</h1>
                </div>
                <div class="top-bar-right">
                    <button id="newClientBtn" class="btn btn-primary">
                        <span>+ Novo Cliente</span>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- Search and Filter -->
                <div class="search-bar">
                    <input type="text" id="searchClients" placeholder="Buscar por nome, email ou telefone..."
                        class="search-input">
                </div>

                <!-- Clients Table -->
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>CPF</th>
                                <th>Equipamentos</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTable">
                            <tr>
                                <td colspan="6" class="text-center">Carregando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: New/Edit Client -->
    <div id="clientModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Cliente</h2>
                <button class="btn-close" id="closeClientModal">&times;</button>
            </div>

            <form id="clientForm" class="form-grid">
                <input type="hidden" id="clientId">

                <div class="form-group">
                    <label for="clientName">Nome *</label>
                    <input type="text" id="clientName" name="name" placeholder="Nome completo" required>
                </div>

                <div class="form-group">
                    <label for="clientEmail">Email *</label>
                    <input type="email" id="clientEmail" name="email" placeholder="email@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="clientPhone">Telefone *</label>
                    <input type="tel" id="clientPhone" name="phone" placeholder="(11) 99999-9999" required>
                </div>

                <div class="form-group">
                    <label for="clientCpf">CPF</label>
                    <input type="text" id="clientCpf" name="cpf" placeholder="000.000.000-00">
                </div>

                <div class="form-group full-width">
                    <label for="clientAddress">Endereço</label>
                    <input type="text" id="clientAddress" name="address" placeholder="Rua, número, complemento">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelClientBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Client Details -->
    <div id="clientDetailsModal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="detailsTitle">Detalhes do Cliente</h2>
                <button class="btn-close" id="closeDetailsModal">&times;</button>
            </div>

            <div class="modal-body">
                <div class="details-grid">
                    <div class="detail-item">
                        <label>Nome</label>
                        <p id="detailName"></p>
                    </div>
                    <div class="detail-item">
                        <label>Email</label>
                        <p id="detailEmail"></p>
                    </div>
                    <div class="detail-item">
                        <label>Telefone</label>
                        <p id="detailPhone"></p>
                    </div>
                    <div class="detail-item">
                        <label>CPF</label>
                        <p id="detailCpf"></p>
                    </div>
                    <div class="detail-item full-width">
                        <label>Endereço</label>
                        <p id="detailAddress"></p>
                    </div>
                </div>

                <div class="section-divider"></div>

                <h3>Histórico de Serviços</h3>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Número OS</th>
                                <th>Equipamento</th>
                                <th>Status</th>
                                <th>Data</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody id="clientHistoryTable">
                            <tr>
                                <td colspan="5" class="text-center">Nenhum serviço registrado</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="closeDetailsBtn">Fechar</button>
                    <button type="button" class="btn btn-primary" id="editClientBtn">Editar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script> <!-- Logger e SUPABASE_CONFIG -->
    <script src="js/auth.js"></script> <!-- usa Logger -->
    <script src="js/db.js"></script> <!-- precisa do supabase e config -->
    <script src="js/clientes.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
